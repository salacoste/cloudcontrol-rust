<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap-theme.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="/assets/style.css">

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.2.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
  <style>

  </style>
</head>

<body>
  <div class="container-fluid">
    <form class="form" id="propertyForm">
      <h2><a href="/"><i class="fa fa-arrow-left"></i></a> Edit Asset Number</h2>
      <div class="form-group">
        <label>Current Number</label>
        <input class="form-control" type="text" disabled=true value="{{ CurrentPropertyId }}">
      </div>
      <div class="form-group">
        <label>New Number</label>
        <input class="form-control" type="text" name="id" placeholder="Enter here if not starting with HIH-PHO-">
      </div>
      <div class="form-group">
        <div class="input-group">
          <span class="input-group-addon">HIH-PHO-</span>
          <input class="form-control" type="number" name="id_number" autofocus="autofocus">
        </div>
      </div>
      <button class="btn btn-default" type="submit">Submit</button>
      <span id="message"></span>
    </form>
  </div>

  <script>
    var udid = "{{ Udid }}";

    document.getElementById('propertyForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var fullId = document.querySelector('input[name="id"]').value.trim();
      var numId = document.querySelector('input[name="id_number"]').value.trim();
      var propertyId = fullId || (numId ? 'HIH-PHO-' + numId : '');

      if (!propertyId) {
        document.getElementById('message').textContent = 'Please enter an asset number';
        return;
      }

      document.getElementById('message').textContent = 'Saving...';

      $.ajax({
        url: '/api/v1/devices/' + udid + '/property',
        method: 'POST',
        data: JSON.stringify({property_id: propertyId}),
      }).then(function(ret) {
        document.getElementById('message').textContent = 'Saved!';
        window.location = '/';
      }).fail(function(err) {
        document.getElementById('message').textContent = 'Error: ' + (err.responseJSON ? err.responseJSON.error : 'Unknown');
      });
    });
  </script>
</body>

</html>
