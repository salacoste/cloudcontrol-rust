# CloudControl server configuration
# Story 12-4: Configurable server settings

description: "default development config"

# Server configuration
server:
  port: 8000

# Connection pool configuration (Story 12-4)
pool:
  max_size: 1200
  idle_timeout_secs: 600

# Cache configuration (Story 12-4)
cache:
  device_info_max: 500
  device_info_ttl_secs: 300

# Database configuration (SQLite)
db_configs:
  type: sqlite
  db_name: cloudcontrol.db

# API authentication (optional — if not set, all endpoints are open)
# api_key: "your-secret-key-here"

# JWT authentication configuration (Story 14-1)
# IMPORTANT: Set JWT_SECRET environment variable in production!
auth:
  # jwt_secret: "${JWT_SECRET}"  # Use environment variable in production
  access_token_expiry_minutes: 15
  refresh_token_expiry_days: 7

# Rate limiting (optional — if not set, rate limiting is disabled)
# rate_limit:
#   requests_per_window: 100   # max requests per IP per window
#   window_secs: 60            # window size in seconds
#   category_limits:           # per-category overrides
#     auth: 5                  # 5 requests per minute for login/register (Story 14-1)
#     screenshot: 30
#     batch: 10
#     control: 60
#     websocket: 5
